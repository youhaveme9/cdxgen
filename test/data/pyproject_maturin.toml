[build-system]
requires = ["maturin>=1.0,<2.0"]
build-backend = "maturin"

[project]
name = "my-rust-python-lib"
version = "0.3.0"
description = "A Python library with Rust bindings using maturin and PyO3"
requires-python = ">=3.9"
license = "MIT"

keywords = ["rust", "pyo3", "maturin", "bindings"]
classifiers = [
    "Programming Language :: Rust",
    "Programming Language :: Python :: Implementation :: CPython",
    "Programming Language :: Python :: Implementation :: PyPy",
]
dependencies = [
    "numpy>=2.2.0",
    "typing-extensions>=4.12.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=9.0",
    "maturin>=1.13.0",
]

[tool.maturin]
features = ["pyo3/extension-module"]
python-source = "python"
module-name = "my_rust_python_lib._lib"
