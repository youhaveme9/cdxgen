name: Repo tests

on:
  pull_request:
    paths:
      - '.github/workflows/repotests.yml'
      - '.nvmrc'
      - '.pnpmfile.cjs'
      - 'bin/**'
      - 'data/**'
      - 'index.cjs'
      - 'lib/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '!**.poku.js'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  NEXUS_URL: http://100.73.146.80:8081/repository/npm/

# https://docs.github.com/en/actions/writing-workflows/choosing-what-your-workflow-does/controlling-permissions-for-github_token
permissions: {}

jobs:
  cli-tests-quick-amd64:
    runs-on: ["self-hosted", "ubuntu", "amd64"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          repository: 'hoolicorp/java-sec-code'
          path: 'repotests/java-sec-code'
      - name: Trim CI agent
        run: |
          rm -rf /tmp/docker-images-* /tmp/atom-usages-* /tmp/atom-reachables-* /tmp/cdx*
      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
      - name: Use Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version-file: .nvmrc
          package-manager-cache: false
      - name: Setup Nexus usage
        run: echo "registry=$NEXUS_URL" > .npmrc
      - name: pnpm install
        run: |
          pnpm install:frozen
          mkdir -p bomresults
          rm -rf $CDXGEN_TEMP_DIR && mkdir -p $CDXGEN_TEMP_DIR
        env:
          CI: true
          CDXGEN_TEMP_DIR: ${{ runner.temp }}/cdxgen-repotests
      - name: repotests java-sec-code
        run: |
          bin/cdxgen.js -t java repotests/java-sec-code -o bomresults/bom-java-sec-code-1.json --include-formulation --include-crypto --fail-on-error
          bin/cdxgen.js -t java repotests/java-sec-code -o bomresults/bom-java-sec-code-2.json --author foo --author bar --standard asvs-4.0.3
          bin/cdxgen.js -t java repotests/java-sec-code -o bomresults/bom-java-sec-code-3.json --required-only --fail-on-error
          bin/cdxgen.js -t java repotests/java-sec-code -o bomresults/bom-java-sec-code-4.json --filter postgres --filter json
          bin/cdxgen.js -t java repotests/java-sec-code -o bomresults/bom-java-sec-code-5.json --only spring --fail-on-error
          bin/cdxgen.js -t java repotests/java-sec-code -o bomresults/bom-java-sec-code-6.json --deep --evidence
          bin/cdxgen.js -t java repotests/java-sec-code -o bomresults/bom-java-sec-code-7.json --profile research --spec-version 1.6 --export-proto
          ls -lh bomresults
          bin/cdxgen.js -t java repotests/java-sec-code -o bomresults/bom-java-sec-code-8.json --profile license-compliance
          bin/cdxgen.js -t java repotests/java-sec-code -o bomresults/bom-java-sec-code-9.json --include-regex "pom.xml" --bom-audit
          bin/cdxgen.js -t java -t github repotests/java-sec-code -o bomresults/bom-java-sec-code-9.json
          bin/cdxgen.js -t java -exclude-type js repotests/java-sec-code -o bomresults/bom-java-sec-code-10.json
          bin/validate.js -i bomresults/bom-java-sec-code-10.json --format console --fail-severity critical
        shell: bash
      - name: repotests java-sec-code (allow lists)
        run: |
          CDXGEN_ALLOWED_COMMANDS=none CDXGEN_ALLOWED_HOSTS=localhost bin/cdxgen.js -t java repotests/java-sec-code -o bomresults/bom-java-sec-code-1.json
          CDXGEN_ALLOWED_COMMANDS=mvn CDXGEN_ALLOWED_HOSTS="*.maven.org,*.github.com" bin/cdxgen.js -t java repotests/java-sec-code -o bomresults/bom-java-sec-code-2.json --fail-on-error
        shell: bash
        env:
          FETCH_LICENSE: true
          CDXGEN_TRACE_ID: foo
          CDXGEN_DEBUG_MODE: debug
  cli-tests-quick-arm64:
    runs-on: ["self-hosted", "ubuntu", "arm64"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.26.1'
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          repository: 'aws-solutions/iot-device-simulator'
          path: 'repotests/iot-device-simulator'
          ref: 'v3.0.9'
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          repository: 'ollama/ollama'
          path: 'repotests/ollama'
          ref: 'v0.5.7'
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          repository: 'caddyserver/caddy'
          path: 'repotests/caddy'
          ref: 'v2.9.1'
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          repository: 'flutter/gallery'
          ref: 'v2.10.2'
          path: 'repotests/gallery'
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          repository: 'ShiftLeftSecurity/shiftleft-go-example'
          path: 'repotests/shiftleft-go-example'
      - name: Trim CI agent
        run: rm -rf /tmp/docker-images-* /tmp/atom-*  /tmp/mvn-deps*
      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
      - name: Use Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version-file: .nvmrc
          package-manager-cache: false
      - name: Setup Nexus usage
        run: echo "registry=$NEXUS_URL" > .npmrc
      - name: pnpm install
        run: |
          pnpm install:frozen
          mkdir -p bomresults
          rm -rf $CDXGEN_TEMP_DIR && mkdir -p $CDXGEN_TEMP_DIR
        env:
          CI: true
          CDXGEN_TEMP_DIR: ${{ runner.temp }}/cdxgen-repotests
      - name: repotests iot-device-simulator
        run: |
          bin/cdxgen.js -t js -o bomresults/bom-iot.json repotests/iot-device-simulator --fail-on-error
          bin/cdxgen.js -t js -o bomresults/bom-iot15.json repotests/iot-device-simulator --spec-version 1.5 --fail-on-error
        shell: bash
      - name: repotests ollama
        run: |
          bin/cdxgen.js -r -t go repotests/ollama -o bomresults/bom-ollama.json --fail-on-error --bom-audit
          bin/cdxgen.js -r -t go repotests/caddy -o bomresults/bom-caddy.json --fail-on-error
        shell: bash
      - name: repotests go mod tests
        run: |
          mkdir -p gomod-example
          cd gomod-example
          curl -LO https://raw.githubusercontent.com/anchore/syft/main/go.mod
          cd ..
          bin/cdxgen.js -r -t go gomod-example -o bomresults/bom-gomod.json
        shell: bash
      - name: repotests shiftleft-go-example
        run: |
          FETCH_LICENSE=false bin/cdxgen.js -r -t golang repotests/shiftleft-go-example -o bomresults/bom-go.json --fail-on-error --spec-version 1.6 --export-proto
        shell: bash
      - name: repotests gallery
        run: |
          bin/cdxgen.js -r -t dart repotests/gallery -o bomresults/bom-pub.json --fail-on-error --bom-audit
          bin/validate.js -i bomresults/bom-pub.json -o bomresults/bom-pub.sarif --report sarif --fail-severity critical
          ls -l bomresults/bom-pub.sarif
        shell: bash
      - name: Cleanup
        run: rm -rf /tmp/docker-images-* /tmp/atom-*  /tmp/mvn-deps*
  cli-tests:
    strategy:
      fail-fast: true
      matrix:
        java-version: ['24']
        os: ['self-hosted-ubuntu', 'ubuntu-24.04-arm', 'windows-latest', 'macos-15']
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Set up JDK ${{ matrix.java-version }}
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: 'temurin'
          java-version: ${{ matrix.java-version }}
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.26.1'
      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
      - name: Use Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version-file: .nvmrc
          package-manager-cache: false
      - uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2.0.4
        with:
          deno-version: 2.7.5
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.11
      - name: Trim CI agent
        if: matrix.os == 'ubuntu-24.04' || matrix.os == 'ubuntu-24.04-arm'
        run: |
          chmod +x contrib/free_disk_space.sh
          ./contrib/free_disk_space.sh
      - uses: sbt/setup-sbt@508b753e53cb6095967669e0911487d2b9bc9f41 # v1.1.22
      - name: Install bazelisk - linux
        if: matrix.os == 'ubuntu-24.04'
        run: |
          curl -LO "https://github.com/bazelbuild/bazelisk/releases/download/v1.20.0/bazelisk-linux-amd64"
          sudo mv bazelisk-linux-amd64 /usr/local/bin/bazel
          chmod +x /usr/local/bin/bazel
      - name: Install bazelisk - linux arm
        if: matrix.os == 'ubuntu-24.04-arm'
        run: |
          curl -LO "https://github.com/bazelbuild/bazelisk/releases/download/v1.20.0/bazelisk-linux-arm64"
          sudo mv bazelisk-linux-arm64 /usr/local/bin/bazel
          chmod +x /usr/local/bin/bazel
      - name: Install bazelisk - mac
        if: matrix.os == 'macos-15'
        run: |
          brew install bazelisk
      - name: Install bazelisk - windows
        if: matrix.os == 'windows-latest'
        run: choco install -y bazel
      - name: Setup Nexus usage
        if: matrix.os == 'self-hosted-ubuntu'
        run: echo "registry=$NEXUS_URL" > .npmrc
      - name: pnpm install
        run: |
          pnpm install:frozen
          mkdir -p repotests
          mkdir -p bomresults
          mkdir -p denoresults
        env:
          CI: true
          CDXGEN_TEMP_DIR: ${{ runner.temp }}/cdxgen-repotests
      - name: Setup Android SDK
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4.0.1
        with:
          packages: 'platform-tools'
      - run: sdkmanager --uninstall "build-tools;30.0.3"
      - name: Setup swift
        if: matrix.os == 'ubuntu-24.04'
        run: |
          curl -O "https://download.swift.org/swiftly/linux/swiftly-$(uname -m).tar.gz" && \
          tar zxf "swiftly-$(uname -m).tar.gz" && \
          ./swiftly init --quiet-shell-followup && \
          . ~/.local/share/swiftly/env.sh && \
          hash -r
      - name: Setup swift
        if: matrix.os == 'macos-15'
        run: |
          curl -O https://download.swift.org/swiftly/darwin/swiftly.pkg && \
          installer -pkg swiftly.pkg -target CurrentUserHomeDirectory && \
          ~/.swiftly/bin/swiftly init --quiet-shell-followup && \
          . ~/.swiftly/env.sh && \
          hash -r
      - uses: ruby/setup-ruby@0cb964fd540e0a24c900370abf38a33466142735  # v1.305.0
        with:
          ruby-version: '3.4.9'
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.13'
      - name: setup-cocoapods # Not using an action, as it is not implemented for windows!
        run: |
          gem install cocoapods -v 1.16.2 --no-document
        shell: bash
      - name: pip install custom-json-diff
        run: |
          pip install custom-json-diff
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          repository: 'ShiftLeftSecurity/shiftleft-java-example'
          path: 'repotests/shiftleft-java-example'
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          repository: 'ShiftLeftSecurity/shiftleft-ts-example'
          path: 'repotests/shiftleft-ts-example'
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
